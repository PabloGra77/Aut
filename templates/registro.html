<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Portafolio</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9;">
    <h2>Regístrate para ver mis herramientas</h2>
    <p>Déjanos tus datos y accede al catálogo completo de servicios.</p>
    
    <form method="POST" action="/registro" style="display: inline-block; text-align: left; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <label>Nombre del proyecto o empresa:</label><br>
        <input type="text" name="nombre" required style="margin-bottom: 10px; padding: 8px; width: 100%;"><br>
        
        <label>Correo Electrónico:</label><br>
        <input type="email" name="email" required style="margin-bottom: 20px; padding: 8px; width: 100%;"><br>
        
        <button type="submit" style="padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%;">
            Registrarse
        </button>
    </form>
</body>
</html>
